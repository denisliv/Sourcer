server {
    listen 3000;
    server_name _;

    # Static assets served directly by nginx with aggressive caching
    location /static/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon
    location /favicon.ico {
        rewrite ^ /static/favicon.svg permanent;
    }

    # API requests — long timeout, no buffering (SSE streaming)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check proxied to backend
    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # All other requests — serve static HTML pages
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri.html /index.html;
    }
}
